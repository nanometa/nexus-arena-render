  <g filter="url(#titleShadow)">
    <text x="490" y="196" text-anchor="middle" fill="url(#nexusSteel)" stroke="#111827" stroke-width="3" paint-order="stroke fill" font-family="Inter, Roboto, Arial Black, sans-serif" font-size="92" font-weight="950" letter-spacing="10">
      NEXUS
