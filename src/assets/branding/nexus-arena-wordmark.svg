    <text x="490" y="252" text-anchor="middle" fill="url(#nexusGold)" stroke="#0f172a" stroke-width="2" paint-order="stroke fill" font-family="Inter, Roboto, Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="20">
      ARENA
