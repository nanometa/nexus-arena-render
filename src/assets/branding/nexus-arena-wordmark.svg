  <path d="M282 282H698" stroke="url(#nexusGold)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M316 302H664" stroke="#38bdf8" stroke-opacity="0.38" stroke-width="1" stroke-linecap="round"/>
